<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Login</title>
</head>

<body class="login-page">

<div class="login-container">

    <!-- LEFT SIDE -->
    <div class="login-left">
        <h1>Finance</h1>
        <p>Track your money.<br>Stay in control.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="login-box">

        <h2>Welcome Back</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <!-- LOGIN -->
        <form method="POST">
            <input type="hidden" name="action" value="login">

            <input type="text" name="username" placeholder="Username or Email" required>

            <div class="password-wrapper">
                <input type="password" id="login-password" name="password" placeholder="Password" required>
                <span class="toggle-icon" onclick="togglePassword('login-password', this)">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5C5 5 2 12 2 12s3 7 10 7 10-7 10-7-3-7-10-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="divider">OR</div>

        <!-- SIGN UP -->
        <form method="POST" onsubmit="return validateSignup()">
            <input type="hidden" name="action" value="signup">

            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>

            <div class="password-wrapper">
                <input type="password" id="signup-password" name="password" placeholder="Password" required>
                <span class="toggle-icon" onclick="togglePassword('signup-password', this)">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5C5 5 2 12 2 12s3 7 10 7 10-7 10-7-3-7-10-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>

            <div class="password-wrapper">
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                <span class="toggle-icon" onclick="togglePassword('confirm-password', this)">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 5C5 5 2 12 2 12s3 7 10 7 10-7 10-7-3-7-10-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>

            <div id="validation-msg" class="validation"></div>

            <button type="submit">Create Account</button>
        </form>

    </div>
</div>

<script>
function togglePassword(id, icon) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.style.opacity = "0.5";
    } else {
        input.type = "password";
        icon.style.opacity = "1";
    }
}

function validateSignup() {
    const password = document.getElementById("signup-password").value;
    const confirm = document.getElementById("confirm-password").value;
    const msg = document.getElementById("validation-msg");

    if (password.length < 6) {
        msg.innerText = "Password must be at least 6 characters";
        return false;
    }

    if (password !== confirm) {
        msg.innerText = "Passwords do not match";
        return false;
    }

    msg.innerText = "";
    return true;
}
</script>

</body>
</html>
